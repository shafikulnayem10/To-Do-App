<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="bg-orbs">
        <span class="orb orb-1"></span>
        <span class="orb orb-2"></span>
        <span class="orb orb-3"></span>
    </div>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="header-icon"><i class="fa-solid fa-list-check"></i></div>
                <h1 class="card-title">TO-DO APP</h1>
                <p class="card-subtitle">Stay focused. Get things done.</p>
            </div>
            <div class="card-body">
                <form class="todo-form">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-plus input-icon"></i>
                        <input type="text" placeholder="Add a new task..." id="inputTodo" autocomplete="off">
                        <button type="submit" class="btn" id="addTodoButton">
                            <span>Add</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </form>
                <div id="message"></div>
                <div class="list-header" id="listHeader">
                    <span class="task-count" id="taskCount">0 tasks</span>
                    <span class="list-label">Your Tasks</span>
                </div>
                <ul id="lists"></ul>
                <div class="empty-state" id="emptyState">
                    <i class="fa-regular fa-clipboard"></i>
                    <p>No tasks yet. Add one above!</p>
                </div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
